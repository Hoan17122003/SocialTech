  mysqlhost : 
    image: mysql:8.0.45
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: Socialdb
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - SocialNetwork

volumes:
  mysql-data:
networks:
  SocialNetwork:
    driver: bridge